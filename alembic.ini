# Alembic config for the Postgres + pgvector path. The database URL is NOT hardcoded
# here — alembic/env.py reads it from DATABASE_URL (the same one the app uses).
[alembic]
script_location = alembic

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
